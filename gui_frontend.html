<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CodeX Register · Web UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #070b12;
      --bg-1: #0d1420;
      --bg-2: #111a29;
      --line: #223247;
      --card: rgba(17, 26, 39, 0.88);
      --card-soft: rgba(13, 21, 33, 0.88);
      --text: #d9e3ef;
      --muted: #8ea3bb;
      --accent: #3ea6ff;
      --accent-2: #38c8aa;
      --danger: #f46b78;
      --warn: #f7b267;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      color: var(--text);
      font-family: "Space Grotesk", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 14% 12%, rgba(56, 200, 170, 0.15), transparent 32%),
        radial-gradient(circle at 88% 18%, rgba(62, 166, 255, 0.16), transparent 28%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 52%, var(--bg-2));
    }

    body {
      overflow: hidden;
    }

    .page-wrap {
      height: 100vh;
      padding: 10px;
    }

    .main-layout {
      height: calc(100vh - 20px);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(12, 18, 28, 0.9);
      box-shadow: 0 16px 44px var(--shadow);
    }

    .main-right-layout {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }

    .sider {
      background: linear-gradient(180deg, #111a29, #0c1320 72%, #0a111b);
      border-right: 1px solid var(--line);
    }

    .brand {
      padding: 20px 18px 14px;
      border-bottom: 1px solid rgba(142, 163, 187, 0.2);
      color: #e8eef7;
    }

    .brand h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0.6px;
      font-weight: 700;
    }

    .brand p {
      margin: 8px 0 0;
      font-size: 12px;
      color: rgba(189, 205, 222, 0.82);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(9, 15, 24, 0.84);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .header-title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0.3px;
      color: #eef5ff;
    }

    .header-title p {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    .header-status {
      width: min(450px, 58vw);
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
    }

    .progress-wrap {
      display: grid;
      grid-template-columns: 56px 1fr;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .run-metrics {
      grid-column: 1 / 3;
      margin-top: -2px;
      font-size: 12px;
      color: #9fb3c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      flex: 1;
      min-height: 0;
      padding: 12px;
      overflow: hidden;
    }

    .content-inner-scroll {
      height: 100%;
      min-height: 0;
      padding-right: 2px;
    }

    .content-inner-scroll .n-scrollbar-container {
      height: 100%;
      min-height: 0;
    }

    .tab-page {
      min-height: 100%;
      overflow: hidden;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .log-page {
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      align-content: stretch;
    }

    .glass-card {
      border: 1px solid rgba(86, 107, 132, 0.38);
      background: var(--card);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .dash-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .dash-actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .split-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 1680px) {
      .split-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .toolbar-btn {
      min-width: 102px;
      height: 34px;
    }

    .toolbar-select {
      width: 300px;
      min-width: 220px;
    }

    .toolbar-select .n-base-selection {
      min-height: 34px;
    }

    .remote-toolbar {
      margin-bottom: 8px;
      align-items: center;
    }

    .remote-search {
      width: 220px;
      min-width: 180px;
    }

    .mail-top-toolbar {
      align-items: center;
    }

    .mail-provider-select {
      width: 220px;
      min-width: 180px;
    }

    .mail-header-meta {
      display: inline-block;
      max-width: min(46vw, 520px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .mail-domain-wrap {
      margin-top: 2px;
      min-height: 26px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .domain-chip {
      height: 28px;
      border: 1px solid #395271;
      border-radius: 999px;
      background: rgba(18, 29, 45, 0.92);
      color: #c7d8ea;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all .16s ease;
    }

    .domain-chip:hover {
      border-color: #5c7da1;
      transform: translateY(-1px);
    }

    .domain-chip.is-selected {
      border-color: #45d4af;
      box-shadow: 0 0 0 1px rgba(69, 212, 175, 0.45) inset;
      color: #e5fff7;
      background: rgba(20, 44, 44, 0.72);
    }

    .domain-chip.has-error {
      border-color: #f46b78;
    }

    .domain-chip-badge {
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(244, 107, 120, 0.92);
      color: #fff;
      font-size: 11px;
      line-height: 18px;
      text-align: center;
      padding: 0 4px;
    }

    .domain-chip-badge-ok {
      background: rgba(69, 212, 175, 0.92);
      color: #06231a;
      font-weight: 700;
    }

    .mail-split-grid {
      grid-template-columns: 1fr;
    }

    @media (min-width: 1560px) {
      .mail-split-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .mail-detail-head {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 6px 10px;
      margin-bottom: 8px;
    }

    .mail-detail-scroll,
    .mail-modal-scroll {
      height: 260px;
      min-height: 220px;
    }

    .mail-detail-pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 13px;
      color: #d4e2f2;
      padding: 4px 2px 10px;
      font-family: "Cascadia Mono", "Consolas", monospace;
    }

    .settings-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
      align-items: start;
    }

    .settings-col {
      min-width: 0;
    }

    .settings-actions {
      margin-top: 10px;
    }

    .account-table-wrap {
      height: 430px;
      min-height: 430px;
      overflow: hidden;
    }

    .json-note-cell {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .json-table .n-data-table-tr.row-file-tone-0 > td,
    .account-table .n-data-table-tr.row-file-tone-0 > td {
      background: rgba(62, 166, 255, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-1 > td,
    .account-table .n-data-table-tr.row-file-tone-1 > td {
      background: rgba(69, 212, 175, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-2 > td,
    .account-table .n-data-table-tr.row-file-tone-2 > td {
      background: rgba(247, 178, 103, 0.09);
    }

    .json-table .n-data-table-tr.row-file-tone-3 > td,
    .account-table .n-data-table-tr.row-file-tone-3 > td {
      background: rgba(244, 107, 120, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-4 > td,
    .account-table .n-data-table-tr.row-file-tone-4 > td {
      background: rgba(163, 125, 255, 0.09);
    }

    .json-table .n-data-table-tr.row-file-tone-5 > td,
    .account-table .n-data-table-tr.row-file-tone-5 > td {
      background: rgba(96, 170, 115, 0.1);
    }

    .json-table .n-data-table-tr.row-file-tone-6 > td,
    .account-table .n-data-table-tr.row-file-tone-6 > td {
      background: rgba(86, 125, 255, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-7 > td,
    .account-table .n-data-table-tr.row-file-tone-7 > td {
      background: rgba(86, 193, 207, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-8 > td,
    .account-table .n-data-table-tr.row-file-tone-8 > td {
      background: rgba(186, 123, 206, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-9 > td,
    .account-table .n-data-table-tr.row-file-tone-9 > td {
      background: rgba(255, 154, 118, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-10 > td,
    .account-table .n-data-table-tr.row-file-tone-10 > td {
      background: rgba(121, 201, 168, 0.08);
    }

    .json-table .n-data-table-tr.row-file-tone-11 > td,
    .account-table .n-data-table-tr.row-file-tone-11 > td {
      background: rgba(137, 176, 255, 0.08);
    }

    .remote-table .n-data-table-tr.row-dup-strong > td {
      background: rgba(244, 107, 120, 0.16) !important;
    }

    .remote-table .n-data-table-tr.row-test-fail > td {
      box-shadow: inset 0 0 0 1px rgba(247, 178, 103, 0.45);
    }

    .remote-table .n-data-table-tr.row-test-ban > td {
      box-shadow: inset 0 0 0 1px rgba(244, 107, 120, 0.66);
      background: rgba(244, 107, 120, 0.1);
    }

    .remote-table .n-data-table-tr.row-test-token > td {
      box-shadow: inset 0 0 0 1px rgba(247, 178, 103, 0.62);
      background: rgba(247, 178, 103, 0.08);
    }

    .remote-table .n-data-table-tr.row-test-429 > td {
      box-shadow: inset 0 0 0 1px rgba(62, 166, 255, 0.66);
      background: rgba(62, 166, 255, 0.08);
    }

    .remote-table .n-data-table-tr.row-test-revived > td {
      box-shadow: inset 0 0 0 1px rgba(69, 212, 175, 0.66);
      background: rgba(69, 212, 175, 0.07);
    }

    .meta {
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .log-card {
      height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(86, 107, 132, 0.5);
      background: var(--card-soft);
    }

    .log-card .n-card__content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .log-scroll {
      flex: 1;
      min-height: 260px;
    }

    .log-view {
      margin: 0;
      font-family: "Cascadia Mono", "Consolas", monospace;
      font-size: 13px;
      line-height: 1.56;
      white-space: pre-wrap;
      word-break: break-word;
      color: #d4e2f2;
      padding: 6px 4px 14px;
    }

    .content-inner-scroll .n-scrollbar-container::-webkit-scrollbar,
    .log-scroll .n-scrollbar-container::-webkit-scrollbar,
    body::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .content-inner-scroll .n-scrollbar-container::-webkit-scrollbar-thumb,
    .log-scroll .n-scrollbar-container::-webkit-scrollbar-thumb,
    body::-webkit-scrollbar-thumb {
      background: rgba(91, 114, 142, 0.56);
      border-radius: 9px;
      border: 2px solid rgba(7, 11, 18, 0.8);
    }

    .content-inner-scroll .n-scrollbar-container::-webkit-scrollbar-track,
    .log-scroll .n-scrollbar-container::-webkit-scrollbar-track,
    body::-webkit-scrollbar-track {
      background: rgba(13, 20, 32, 0.4);
    }

    @media (max-width: 1120px) {
      .dash-grid {
        grid-template-columns: 1fr;
      }

      .settings-two-col {
        grid-template-columns: 1fr;
      }

      .mail-detail-head {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .header-status {
        width: 100%;
      }
    }

    @media (max-width: 860px) {
      body {
        overflow: hidden;
      }

      .page-wrap {
        padding: 0;
        height: 100vh;
      }

      .main-layout {
        border-radius: 0;
        height: 100vh;
        min-height: 100vh;
      }

      .content {
        padding: 10px;
        overflow: hidden;
      }

      .tab-page {
        overflow: hidden;
      }

      .log-scroll {
        min-height: 320px;
      }

    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#b8c9dc;letter-spacing:.2px;">正在加载界面...</div>
  </div>

  <script>
    (function () {
      var appEl = document.getElementById("app");
      function renderFail(title, detail) {
        if (!appEl) return;
        appEl.innerHTML = "";

        var wrap = document.createElement("div");
        wrap.style.minHeight = "100vh";
        wrap.style.display = "flex";
        wrap.style.alignItems = "center";
        wrap.style.justifyContent = "center";
        wrap.style.padding = "24px";

        var card = document.createElement("div");
        card.style.maxWidth = "760px";
        card.style.width = "100%";
        card.style.background = "rgba(15,24,37,.94)";
        card.style.border = "1px solid #2a3a51";
        card.style.borderRadius = "14px";
        card.style.padding = "16px 18px";
        card.style.color = "#dbe7f5";
        card.style.boxShadow = "0 10px 30px rgba(0,0,0,.34)";

        var t = document.createElement("h3");
        t.textContent = title;
        t.style.margin = "0 0 8px";

        var p = document.createElement("p");
        p.textContent = detail;
        p.style.margin = "0";
        p.style.whiteSpace = "pre-wrap";
        p.style.lineHeight = "1.6";

        var tip = document.createElement("p");
        tip.textContent = "建议：1) 安装 Microsoft Edge WebView2 Runtime；2) 确认可访问 unpkg CDN；3) 也可用 --mode browser 先验证。";
        tip.style.margin = "10px 0 0";
        tip.style.fontSize = "12px";
        tip.style.color = "#8ea3bb";

        card.appendChild(t);
        card.appendChild(p);
        card.appendChild(tip);
        wrap.appendChild(card);
        appEl.appendChild(wrap);
      }

      window.__codexMounted = false;
      window.__codexRenderFail = renderFail;

      window.addEventListener("error", function (event) {
        if (window.__codexMounted) return;
        var msg = (event && event.message) ? event.message : "脚本运行异常";
        renderFail("页面加载失败", msg);
      });

      setTimeout(function () {
        if (window.__codexMounted) return;
        if (!window.Proxy) {
          renderFail("当前内核不支持", "检测到旧版 WebView 内核。请安装 Microsoft Edge WebView2 Runtime 后重试。");
          return;
        }
        if (!window.Vue || !window.naive) {
          renderFail("资源加载失败", "未能加载 Vue / Naive UI 资源，请检查网络代理或防火墙设置。\n若在公司网络，请先测试 --mode browser。");
        }
      }, 3200);
    })();
  </script>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/naive-ui"></script>
  <script>
    (function () {
    const Vue = window.Vue;
    const naive = window.naive;
    if (!Vue || !naive) {
      if (window.__codexRenderFail) {
        window.__codexRenderFail("资源加载失败", "未能加载 Vue / Naive UI 资源，请检查网络后重试。");
      }
      return;
    }

      darkTheme,
      NConfigProvider,
      NLayout,
      NLayoutSider,
      NLayoutHeader,
      NLayoutContent,
      NMenu,
      NCard,
      NButton,
      NForm,

      NInput,

      NSelect,
      NSwitch,
      NSpace,
      NTag,
      NProgress,
      NAlert,
      NDataTable,
      NScrollbar,
      NModal
    } = naive;

    const { message } = naive.createDiscreteApi(["message"]);

        NDataTable,
        NScrollbar,
        NModal
      },
      setup() {

          },
          Card: {

          DataTable: {

            thTextColor: "#bfd1e4",
            tdTextColor: "#d5e2f0"
          },
          Input: {

            colorFocus: "rgba(13, 20, 32, 0.92)",
            border: "1px solid #2a3a51",
            borderHover: "1px solid #3a516e",

          },

        const status = Vue.reactive({

        const dashForm = Vue.reactive({

        const loading = Vue.reactive({

        async function apiRequest(path, options = {}) {
          const opts = Object.assign({}, options);
          if (!opts.method) opts.method = "GET";
          if (opts.body && typeof opts.body !== "string") {
            opts.body = JSON.stringify(opts.body);
            opts.headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
          }
          const resp = await fetch(path, opts);
          let payload = null;
          try {
            payload = await resp.json();
          } catch (_e) {
            payload = { ok: false, error: `HTTP ${resp.status}` };
          }
          if (!resp.ok || !payload.ok) {
            throw new Error(payload.error || `HTTP ${resp.status}`);
          }
          return payload.data;
        }

        async function pullLogs() {
          if (loading.logs) return;
          loading.logs = true;
          try {
            const data = await apiRequest(`/api/logs?since=${logSince.value}`);
            const items = Array.isArray(data.items) ? data.items : [];
            if (items.length) {
              for (const it of items) {
                logLines.value.push(String(it.line || ""));
              }
              if (logLines.value.length > 1600) {
                logLines.value.splice(0, logLines.value.length - 1600);
              }
              await Vue.nextTick();
              const sb = logScrollbarRef.value;
              if (sb && typeof sb.scrollTo === "function") {
                sb.scrollTo({ top: 10 ** 9, left: 0 });
              } else {
                const container = document.querySelector(".log-scroll .n-scrollbar-container");
                if (container) {
                  container.scrollTop = container.scrollHeight;
                }
              }
            }
            logSince.value = Number(data.last_id || logSince.value);
          } finally {
            loading.logs = false;
          }
        }

        function applyMailOverview(data) {
          const providers = Array.isArray(data.providers) ? data.providers : [];
          mailProviders.value = providers.map((it) => ({
            label: String((it && it.label) || ""),
            value: String((it && it.value) || "")
          })).filter((it) => it.label && it.value);

          const current = String(data.current || settingsForm.mail_service_provider || "mailfree");
          settingsForm.mail_service_provider = current;
          mailState.provider = current;
          mailDomains.value = Array.isArray(data.domains)
            ? normalizeDomainList(data.domains)
            : [];

          const allowFromApi = normalizeDomainList(data.selected_domains || []);
          const allowFromForm = normalizeDomainList(settingsForm.mail_domain_allowlist || []);
          const domainSet = new Set(mailDomains.value);
          let allow = allowFromApi.length ? allowFromApi : allowFromForm;
          allow = allow.filter((d) => domainSet.has(d));
          if (!allow.length && mailDomains.value.length) {
            allow = [...mailDomains.value];
          }
          setDomainSelection(allow);

          const directCounts = (data && data.domain_error_counts) || {};
          const directRegistered = (data && data.domain_registered_counts) || {};
          const stats = (data && data.domain_stats) || {};
          const merged = {};
          const mergedRegistered = {};
          if (directCounts && typeof directCounts === "object") {
            for (const [k, v] of Object.entries(directCounts)) {
              const d = String(k || "").trim().toLowerCase();
              const n = Number(v || 0);
              if (d && Number.isFinite(n) && n > 0) merged[d] = n;
            }
          }
          if (directRegistered && typeof directRegistered === "object") {
            for (const [k, v] of Object.entries(directRegistered)) {
              const d = String(k || "").trim().toLowerCase();
              const n = Number(v || 0);
              if (d && Number.isFinite(n) && n > 0) mergedRegistered[d] = n;
            }
          }
          if (stats && typeof stats === "object") {
            for (const [k, v] of Object.entries(stats)) {
              const d = String(k || "").trim().toLowerCase();
              const n = Number((v && v.errors) || 0);
              if (d && Number.isFinite(n) && n > 0) merged[d] = n;
              const reg = Number((v && v.registered) || 0);
              if (d && Number.isFinite(reg) && reg > 0) mergedRegistered[d] = reg;
            }
          }
          applyDomainStats({
            error_counts: merged,
            registered_counts: mergedRegistered,
            selected: allow
          });

          mailboxRows.value = Array.isArray(data.mailboxes)
            ? data.mailboxes.map((x) => ({
              key: String((x && x.key) || ((x && x.address) || "")),
              address: String((x && x.address) || ""),
              created_at: String((x && x.created_at) || "-"),
              expires_at: String((x && x.expires_at) || "-"),
              count: Number((x && x.count) || 0)
            })).filter((x) => x.address)
            : [];

          const allowedMailboxKeys = new Set(mailboxRows.value.map((x) => x.key));
          mailboxSelection.value = mailboxSelection.value.filter((k) => allowedMailboxKeys.has(k));

          const addrSet = new Set(mailboxRows.value.map((x) => x.address));
          if (!selectedMailbox.value || !addrSet.has(selectedMailbox.value)) {
            selectedMailbox.value = "";
            mailRows.value = [];
            mailSelection.value = [];
            mailState.email_total = 0;
            resetMailDetail();
          }
          mailState.loaded = true;
        }

            mailDetail.from = String(data.from || "-");

            mailDetail.date = String(data.date || "-");
            mailDetail.content = String(data.content || data.text || "");
            return true;
          } catch (e) {
            if (showError) message.error(String(e.message || e));
            return false;
          } finally {
            loading.mail_detail = false;
          }
        }

        async function openMailboxRow(row) {
          if (!row || !row.address) return;
          await loadMailboxEmails(row.address, true);
        }

        function mailboxRowProps(row) {
          return {
            style: row && row.address === selectedMailbox.value
              ? "background: rgba(62,166,255,.12); box-shadow: inset 0 0 0 2px rgba(62,166,255,.55);"
              : "",
            onClick: () => {
              openMailboxRow(row);
            }
          };
        }

        async function openMailRow(row) {
          if (!row || !row.id) return;
          const ok = await loadMailDetail(row.id, true);
          if (ok) {
            showMailModal.value = true;
          }
        }

        function mailRowProps(row) {
          return {
            style: row && row.id === selectedMailId.value
              ? "background: rgba(69,212,175,.14); box-shadow: inset 0 0 0 2px rgba(69,212,175,.55);"
              : "",
            onClick: () => {
              openMailRow(row);
            }
          };
        }

        async function generateMailbox() {
          loading.mail_generate = true;
          try {
            await saveConfig(false);
            const data = await apiRequest("/api/mail/generate", { method: "POST", body: {} });
            const email = String(data.email || "");
            if (!email) throw new Error("生成邮箱失败：返回为空");
            await refreshMailOverview(false);
            selectedMailbox.value = email;
            await loadMailboxEmails(email, false);
            message.success(`已生成邮箱：${email}`);
          } catch (e) {
            message.error(String(e.message || e));
          } finally {
            loading.mail_generate = false;
          }
        }

        async function deleteSelectedMailboxes() {
          if (!mailboxSelection.value.length) {
            message.warning("请先勾选要删除的邮箱");
            return;
          }
          const keySet = new Set(mailboxSelection.value);
          const targets = mailboxRows.value.filter((x) => keySet.has(x.key)).map((x) => x.address);
          if (!targets.length) {
            message.warning("所选项不包含有效邮箱地址");
            return;
          }
          const names = targets.slice(0, 10).join("\n");
          const ok = window.confirm(
            `将删除以下邮箱（共 ${targets.length} 个）：\n\n${names}${targets.length > 10 ? "\n…" : ""}\n\n此操作不可恢复。`
          );
          if (!ok) return;

          loading.mailbox_delete = true;
          try {
            const data = await apiRequest("/api/mail/mailboxes/delete", {
              method: "POST",
              body: { addresses: targets }
            });
            mailboxSelection.value = [];
            await refreshMailOverview(false);
            if (selectedMailbox.value && !mailboxRows.value.some((x) => x.address === selectedMailbox.value)) {
              selectedMailbox.value = "";
              mailRows.value = [];
              mailSelection.value = [];
              mailState.email_total = 0;
              resetMailDetail();
            }
            const apis = Array.isArray(data.api_summary)
              ? data.api_summary.slice(0, 2)
                .map((x) => `${String((x && x.api) || "-")}×${Number((x && x.count) || 0)}`)
                .join("；")
              : "";
            if (Number(data.fail || 0) === 0) {
              const msg = `邮箱删除完成：成功 ${data.ok}`
                + (apis ? `；接口：${apis}` : "")
                + `；并发 ${Number(data.concurrency || 1)}`;
              message.success(msg);
            } else {
              const errs = Array.isArray(data.errors) ? data.errors : [];
              const detail = errs
                .slice(0, 3)
                .map((x) => `${String((x && x.address) || "-")}: ${String((x && x.error) || "未知错误")}`)
                .join("；");
              const suffix = errs.length > 3 ? "；..." : "";
              const msg = `邮箱删除完成：成功 ${data.ok}，失败 ${data.fail}`
                + (detail ? `；原因：${detail}${suffix}` : "")
                + (apis ? `；接口：${apis}` : "")
                + `；并发 ${Number(data.concurrency || 1)}`;
              message.warning(msg);
            }
          } catch (e) {
            message.error(String(e.message || e));
          } finally {
            loading.mailbox_delete = false;
          }
        }

        async function deleteSelectedEmails() {
          if (!mailSelection.value.length) {
            message.warning("请先勾选要删除的邮件");
            return;
          }
          const keySet = new Set(mailSelection.value);
          const ids = mailRows.value.filter((x) => keySet.has(x.key)).map((x) => x.id);
          if (!ids.length) {
            message.warning("所选项不包含有效邮件 ID");
            return;
          }
          const ok = window.confirm(`将删除已选邮件 ${ids.length} 封，确认继续？`);
          if (!ok) return;

          loading.mail_delete = true;
          try {
            const data = await apiRequest("/api/mail/emails/delete", {
              method: "POST",
              body: { ids }
            });
            mailSelection.value = [];
            if (ids.includes(String(selectedMailId.value || ""))) {
              resetMailDetail();
              showMailModal.value = false;
            }
            await loadMailboxEmails(selectedMailbox.value, false);
            if (Number(data.fail || 0) === 0) {
              message.success(`邮件删除完成：成功 ${data.ok}`);
            } else {
              const errs = Array.isArray(data.errors) ? data.errors : [];
              const detail = errs
                .slice(0, 3)
                .map((x) => `${String((x && x.id) || "-")}: ${String((x && x.error) || "未知错误")}`)
                .join("；");
              const suffix = errs.length > 3 ? "；..." : "";
              const msg = `邮件删除完成：成功 ${data.ok}，失败 ${data.fail}`
                + (detail ? `；原因：${detail}${suffix}` : "");
              message.warning(msg);
            }
          } catch (e) {
            message.error(String(e.message || e));
          } finally {
            loading.mail_delete = false;
          }
        }

        async function clearSelectedMailboxEmails() {
          const target = String(selectedMailbox.value || "").trim();
          if (!target) {
            message.warning("请先选择邮箱账号");
            return;

          const ok = window.confirm(`将清空邮箱 ${target} 的全部邮件，确认继续？`);

          loading.mail_clear = true;
          try {
            const data = await apiRequest("/api/mail/emails/clear", {

              body: { mailbox: target }

            await refreshMailOverview(false);
            resetMailDetail();
            showMailModal.value = false;
            message.success(`清空完成：删除 ${Number(data.deleted || 0)} 封`);
          } catch (e) {
            message.error(String(e.message || e));
          } finally {
            loading.mail_clear = false;
          }
        }

        async function startRun() {
          loading.start = true;
          try {

              method: "POST",

            message.success("任务已启动");

            message.error(String(e.message || e));
          } finally {

          }
        }

        async function stopRun() {
          try {
            await apiRequest("/api/stop", { method: "POST" });
            await loadStatus();
            message.info("已发出停止指令");
          } catch (e) {
            message.error(String(e.message || e));
          }
        }

        async function initialLoad() {
          await loadConfig();
          await Promise.all([
            refreshJson(false),
            refreshAccounts(false),
            loadRemoteCache(),
            loadMailProviders(),
            loadMailDomainStats(),
            loadStatus(),
            pullLogs()
          ]);
        }

        async function poll() {
          try {
            await loadStatus();
            await pullLogs();
            pollTick += 1;
            if (status.running && pollTick % 4 === 0) {
              await Promise.all([refreshJson(false), refreshAccounts(false)]);
            }
            if (
              activeTab.value === "data" &&
              (
                status.remote_busy ||
                loading.remote ||
                status.remote_test_busy ||
                loading.remote_test ||
                pollTick % 6 === 0
              )
            ) {
              await loadRemoteCache();
            }
            if (activeTab.value === "mail" && pollTick % 6 === 0) {
              await loadMailDomainStats();
            }
          } catch (_e) {
            // 轮询容错，下一轮重试。
          }
        }

        Vue.onMounted(async () => {
          try {
            await initialLoad();
          } catch (e) {
            message.error(String(e.message || e));
          }
          pollTimer = window.setInterval(poll, 1500);
        });

        Vue.watch(activeTab, async (tab) => {
          if (tab !== "mail") return;
          await loadMailDomainStats();
          if (mailState.loaded) return;
          try {
            await refreshMailOverview(false);
          } catch (_e) {
            // 保持静默，用户可手动刷新。
          }
        });

        Vue.onBeforeUnmount(() => {
          if (pollTimer) {
            window.clearInterval(pollTimer);
            pollTimer = null;
          }
        });

        return {

          themeOverrides,
          activeTab,
          menuOptions,
          status,
          progressPercent,
          totalPlanCount,
          statusTagType,
          runSuccessRateText,
          runRetryReasonText,
          dashForm,
          settingsForm,
          loading,
          jsonRows,

          jsonInfo,

          accountBatchFiles,
          accountInfo,

          mailboxSelection,

          selectedMailbox,
          filteredMailboxRows,

          mailSelection,

          mailState,

          mailInfoText,

          logText,

          jsonColumns,

          domainErrorCount,
          domainRegisteredCount,
          mailboxRowProps,
          mailRowProps,

          saveConfig,
          refreshJson,

          fetchRemoteAll,
          remoteSelectAll,
          remoteSelectNone,

          loadMailDomainStats,
          generateMailbox,
          mailboxSelectAll,
          mailboxSelectNone,
          deleteSelectedMailboxes,
          refreshSelectedMailboxEmails,
          deleteSelectedEmails,
          clearSelectedMailboxEmails,
          startRun,
          stopRun,
          clearLogs,
          manualPoll

                          :max-height="350"
                          v-model:checked-row-keys="mailboxSelection"
                        />
                      </n-card>

                      <n-card class="glass-card" title="邮件列表" size="small">
                        <template #header-extra>
                          <span
                            class="meta mail-header-meta"
                            :title="'当前邮箱：' + (selectedMailbox || '-') + ' · 当前邮件：' + selectedMailLabel"
                          >当前邮箱：{{ selectedMailbox || '-' }} · 当前邮件：{{ selectedMailLabel }}</span>
                        </template>
                        <div class="toolbar">
                          <n-button class="toolbar-btn" :loading="loading.mail_emails" @click="refreshSelectedMailboxEmails">刷新邮件</n-button>
                          <n-button
                            class="toolbar-btn"
                            type="error"
                            ghost
                            :loading="loading.mail_clear"
                            @click="clearSelectedMailboxEmails"
                          >清空当前邮箱</n-button>
                          <n-button
                            class="toolbar-btn"
                            type="error"
                            :loading="loading.mail_delete"
                            @click="deleteSelectedEmails"
                          >删除已选邮件</n-button>
                        </div>
                        <n-data-table
                          size="small"
                          table-layout="fixed"
                          :single-line="false"
                          :columns="mailColumns"
                          :data="mailRows"
                          :row-key="rowKeyMail"
                          :row-props="mailRowProps"
                          :max-height="350"
                          v-model:checked-row-keys="mailSelection"
                        />
                      </n-card>
                    </div>

                    <n-modal
                      v-model:show="showMailModal"
                      preset="card"
                      title="邮件内容"
                      :mask-closable="true"
                      style="width: min(1080px, 94vw)"
                    >
                      <div class="mail-detail-head">
                        <div class="meta">ID：{{ mailDetail.id || '-' }}</div>
                        <div class="meta">发件人：{{ mailDetail.from || '-' }}</div>
                        <div class="meta">时间：{{ mailDetail.date || '-' }}</div>
                        <div class="meta">主题：{{ mailDetail.subject || '-' }}</div>
                      </div>
                      <n-scrollbar class="mail-modal-scroll">
                        <pre class="mail-detail-pre">{{ mailDetailText }}</pre>
                      </n-scrollbar>
                    </n-modal>
                  </div>

                  <div v-else-if="activeTab === 'settings'" class="tab-page">
                    <n-card class="glass-card" title="MailFree 与服务配置" size="small">
                    <div class="settings-two-col">
                      <n-form class="settings-col" label-placement="left" label-width="180" :model="settingsForm">
                        <n-form-item label="MailFree 服务地址">
                          <n-input v-model:value="settingsForm.worker_domain" placeholder="https://mailfree.ylmty520.workers.dev" />
                        </n-form-item>
                        <n-form-item label="Freemail 用户名">
                          <n-input v-model:value="settingsForm.freemail_username" />
                        </n-form-item>
                        <n-form-item label="Freemail 密码">
                          <n-input v-model:value="settingsForm.freemail_password" type="password" show-password-on="click" />
                        </n-form-item>
                        <n-form-item label="MailFree 随机域名">
                          <n-switch v-model:value="settingsForm.mailfree_random_domain" />
                        </n-form-item>
                        <n-form-item label="同步 API 地址">
                          <n-input v-model:value="settingsForm.accounts_sync_api_url" />
                        </n-form-item>
                        <n-form-item label="账号列表 API">
                          <n-input v-model:value="settingsForm.accounts_list_api_base" />
                        </n-form-item>
                        <n-form-item label="Bearer Token">
                          <n-input v-model:value="settingsForm.accounts_sync_bearer_token" type="password" show-password-on="mousedown" />
                        </n-form-item>
                        <n-form-item label="Timezone">
                          <n-input v-model:value="settingsForm.accounts_list_timezone" placeholder="Asia/Shanghai" />
                        </n-form-item>
                        <n-form-item label="校验 HTTPS 证书">
                          <n-switch v-model:value="settingsForm.openai_ssl_verify" />
                        </n-form-item>
                        <n-form-item label="跳过网络地区检测">
                          <n-switch v-model:value="settingsForm.skip_net_check" />
                        </n-form-item>
                      </n-form>

                      <n-form class="settings-col" label-placement="left" label-width="180" :model="settingsForm">
                        <n-form-item label="启用 FlClash 动态换 IP">
                          <n-switch v-model:value="settingsForm.flclash_enable_switch" />
                        </n-form-item>
                        <n-form-item label="FlClash 控制器">
                          <n-input v-model:value="settingsForm.flclash_controller" placeholder="127.0.0.1:9090" />
                        </n-form-item>
                        <n-form-item label="FlClash Secret（可空）">
                          <n-input v-model:value="settingsForm.flclash_secret" type="password" show-password-on="click" placeholder="本地可留空" />
                        </n-form-item>
                        <n-form-item label="节点组名">
                          <n-input v-model:value="settingsForm.flclash_group" placeholder="PROXY / 节点选择" />
                        </n-form-item>
                        <n-form-item label="切换策略">
                          <n-select v-model:value="settingsForm.flclash_switch_policy" :options="flclashPolicyOptions" style="width: 220px" />
                        </n-form-item>
                        <n-form-item label="切换后等待(秒)">
                          <n-input-number v-model:value="settingsForm.flclash_switch_wait_sec" :min="0" :max="10" :step="0.1" style="width: 220px" />
                        </n-form-item>
                        <n-form-item label="节点延迟测试链接">
                          <n-input v-model:value="settingsForm.flclash_delay_test_url" placeholder="https://www.gstatic.com/generate_204" />
                        </n-form-item>
                        <n-form-item label="延迟测试超时(ms)">
                          <n-input-number v-model:value="settingsForm.flclash_delay_timeout_ms" :min="500" :max="20000" :step="100" style="width: 220px" />
                        </n-form-item>
                        <n-form-item label="可用延迟阈值(ms)">
                          <n-input-number v-model:value="settingsForm.flclash_delay_max_ms" :min="100" :max="30000" :step="100" style="width: 220px" />
                        </n-form-item>
                        <n-form-item label="延迟测试重试">
                          <n-input-number v-model:value="settingsForm.flclash_delay_retry" :min="0" :max="5" style="width: 220px" />
                        </n-form-item>
                        <n-form-item label="批量测试并发">
                          <n-input-number v-model:value="settingsForm.remote_test_concurrency" :min="1" :max="12" style="width: 220px" />
                        </n-form-item>
                        <n-form-item label="批量测试 SSL 重试">
                          <n-input-number v-model:value="settingsForm.remote_test_ssl_retry" :min="0" :max="5" style="width: 220px" />
                        </n-form-item>
                      </n-form>
                    </div>
                    <n-space class="settings-actions">
                      <n-button type="primary" :loading="loading.save" @click="saveConfig(true)">保存配置</n-button>
                      <n-button @click="manualPoll">刷新状态</n-button>
                    </n-space>
                    </n-card>
                  </div>

                  <div v-else class="tab-page log-page">
                    <n-card class="glass-card log-card" title="运行日志" size="small">
                      <template #header-extra>
                        <n-space :size="8">
                          <n-button size="small" @click="manualPoll">刷新</n-button>
                          <n-button size="small" @click="clearLogs">清空</n-button>
                        </n-space>
                      </template>
                      <n-scrollbar ref="logScrollbarRef" class="log-scroll">
                        <pre class="log-view">{{ logText || '暂无日志' }}</pre>
                      </n-scrollbar>
                    </n-card>
                  </div>
                  </n-scrollbar>
                </div>
              </div>
            </n-layout>
          </div>
        </n-config-provider>
      `
    };

    Vue.createApp(App).mount("#app");
    window.__codexMounted = true;
    })();
  </script>
</body>
</html>
